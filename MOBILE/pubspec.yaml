name: flutter_cortes_top
description: "Projeto APP para agendamento de barbearias."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0  # Para fazer requisições HTTP
  provider: ^6.1.1  # Para gerenciamento de estado
  mask_text_input_formatter: ^2.9.0  # Para máscara de telefone
  shared_preferences: ^2.2.2 # Para armazenar dados localmente
  fl_chart: ^0.68.0
  flutter_localizations:
    sdk: flutter
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

